name: Automated Churn Pipeline

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 6am UTC
  workflow_dispatch:        # adds a manual "Run workflow" button in the GitHub UI

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion (release next batch)
        run: python src/ingest.py

      - name: Run training + evaluation
        run: python src/train.py

      - name: Commit updated data + model back to the repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pipeline.db data/raw/telco_churn_full.csv models/model.pkl
          git diff --staged --quiet || git commit -m "Automated pipeline run: ingest + retrain"
          git push
